    - "scripts/run-repo-consistency-guards.mjs"
  config: []
  migrations: []

acceptance:
  normal:
    - "manifest 必须登记 `sourceOfTruth.uiDesignSystem`，覆盖统一样式入口、token、runtime design 和至少一个 patterns.* 共享模式文件。"
    - "运行 `node ./scripts/check-ui-token-ssot.mjs --all` 时，必须通过 UI 设计系统主源、消费者范围和 raw color drift 守卫。"
    - "repo guard regression 必须验证 UI token SSOT 守卫已接入统一入口，并覆盖放行主源文件、拦截消费侧原始色值漂移等行为。"
    - "contracts / SSOT / 测试策略文档必须同步说明 UI 设计系统主源和守卫入口。"
  error:
    - "若共享样式文件未登记到 `uiDesignSystem.sourceFiles`，`check-ui-token-ssot` 必须 FAIL。"
    - "若 consumer 范围内出现绕过共享 token 的 raw color drift，`check-ui-token-ssot` 必须 FAIL。"
    - "若 UI 设计系统守卫未接入 manifest 或 repo consistency 统一入口，repo regression 或 conformance 必须 FAIL。"
  boundary:
    - "本轮只收口 manifest 登记、守卫和已命中消费者，不扩展到新的前端业务模块。"
    - "本轮允许在主源文件内保留必要原始色值定义，但 consumer 范围不得回流直写原始色值。"
  permission:
    - "本次治理不改变业务权限语义，只补权限相关页面的共享样式收敛。"
  stateFlow:
    - "本次治理不改变业务状态流，只调整视觉承载和仓库级登记。"

deliveryEvidenceRequired:
  - "verification_record"
  - "ui_token_guard_pass"
  - "repo_guard_regression"
  - "manifest_guard_pass"
  - "conformance_guard_pass"

releaseAndRollback:
  rolloutSteps:
    - "在 manifest 中登记 UI 设计系统主源与 consumer 范围"
    - "新增 `check-ui-token-ssot` 守卫并接入 repo consistency 统一入口"
    - "回写 contracts / SSOT / 自动化测试策略文档与 repo regression"
    - "执行 manifest、ui token、repo regression 与 conformance 校验"
  rollbackPath:
    - "回退 UI 设计系统 manifest 登记、守卫脚本、文档和 repo regression 改动"
    - "重新执行 manifest、repo regression 与 conformance，确认仓库回到第三十二批稳定状态"
  monitoring:
    - "node ./scripts/check-ui-token-ssot.mjs --all"
    - "performance-management-system/test/repo-guard-scripts.test.mjs"
    - "reports/delivery/xuedao-ssot-conformance.latest.{md,json}"

waivers: []
notes:
  - "本次是第三十三批 repo-level SSOT 治理，目标是把仓库前端视觉基座从“约定俗成”提升为显式 machine source。"
  - "这批核心是补 manifest 登记、守卫接线和文档/测试留痕，不新增业务语义。"

delivery:
  requiredCommands:
    - "node ./scripts/check-xuedao-ssot-manifest.mjs"
    - "node ./scripts/check-ui-token-ssot.mjs --all"
    - "node --test ./performance-management-system/test/repo-guard-scripts.test.mjs"
    - "node ./scripts/check-xuedao-ssot-conformance.mjs"
  expectedArtifacts:
    - "reports/delivery/xuedao-ssot-conformance.latest.md"
    - "reports/delivery/xuedao-ssot-conformance.latest.json"

residualRisk:
  - "UI token 守卫当前只覆盖 manifest 声明的 consumer 范围；后续若新增前端模块或样式入口，仍需同步登记，否则会形成治理盲区。"
