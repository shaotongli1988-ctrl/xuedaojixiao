impactSurface:
  code:
    - "scripts/audit-worktree-split.mjs"
  tests:
    - "performance-management-system/test/repo-guard-scripts.test.mjs"
  docs:
    - "README.md"
    - "performance-management-system/docs/24-自动化测试策略与脚本规划.md"
    - "contracts/ssot/xuedao-ssot-inventory.md"
    - "contracts/ssot/records/change-record.yaml"
    - "contracts/ssot/records/verification-record.yaml"
  scripts:
    - "scripts/audit-worktree-split.mjs"
    - "scripts/check-xuedao-ssot-conformance.mjs"
  config: []
  migrations: []

acceptance:
  normal:
    - "运行 `node ./scripts/audit-worktree-split.mjs --batch-id <id> --output paths` 时，终端输出路径清单的同时，默认写出 `reports/delivery/worktree-split-audit.<id>.latest.paths`。"
    - "README 与自动化测试策略文档必须展示从 worktree split 到 repo-consistency `--files-from` 的闭环命令。"
    - "repo guard regression 必须验证 `.paths` 产物默认落盘。"
  error:
    - "若 `--output paths` 不再写出 `.paths` 产物，repo guard regression 必须 FAIL。"
    - "若文档示例重新指向不存在的旧 `.paths` 命名，conformance/doc 回写守卫必须 FAIL。"
  boundary:
    - "本轮不改变 batch 归类优先级、risk level 或推荐验证命令。"
    - "本轮不把 worktree split 自动接线到 pre-push。"
  permission:
    - "本次治理不改变业务权限语义。"
  stateFlow:
    - "本次治理不改变业务状态流语义。"

deliveryEvidenceRequired:
  - "verification_record"
  - "worktree_split_paths_artifact_pass"
  - "repo_guard_regression"
  - "manifest_guard_pass"
  - "conformance_guard_pass"

releaseAndRollback:
  rolloutSteps:
    - "给 audit-worktree-split 增加 `.paths` 默认落盘能力"
    - "回写 README、自动化测试策略与 inventory"
    - "补 repo guard regression 并执行 conformance"
  rollbackPath:
    - "回退 audit-worktree-split、文档与 repo regression 改动"
    - "重新执行 manifest、repo guard regression 与 conformance，确认恢复到第三十一批稳定状态"
  monitoring:
    - "reports/delivery/worktree-split-audit.<batch-id>.latest.paths"
    - "scripts/audit-worktree-split.mjs --output paths 输出"
    - "reports/delivery/xuedao-ssot-conformance.latest.{md,json}"

waivers: []
notes:
  - "本次是第三十二批 repo-level SSOT 治理，目标是把拆批报告和 scoped 守卫真正连成可复用链路。"
  - "这批仍只补交付闭环，不改变分类算法。"

delivery:
  requiredCommands:
    - "node ./scripts/check-xuedao-ssot-manifest.mjs"
    - "node ./scripts/audit-worktree-split.mjs --batch-id governance-ssot --output paths"
    - "node --test ./performance-management-system/test/repo-guard-scripts.test.mjs"
    - "node ./scripts/check-xuedao-ssot-conformance.mjs"
  expectedArtifacts:
    - "reports/delivery/worktree-split-audit.governance-ssot.latest.paths"
    - "reports/delivery/xuedao-ssot-conformance.latest.md"
    - "reports/delivery/xuedao-ssot-conformance.latest.json"

residualRisk:
  - "worktree split 只负责产出批次建议与路径清单，不自动判定批次是否真的可直接合并提交，人工 review 仍是最后一道边界。"
