# xuedao repo-level change record.
# Captures the thirty-second-batch SSOT governance rollout that closes
# the worktree-split paths artifact handoff into scoped repo guards.

recordVersion: "1.0"
changeId: "XUEDAO-CHG-20260425-028"
title: "Write worktree-split batch path artifacts for direct repo-consistency guard consumption"
owner: "codex"
status: "verified"
reviewers:
  - "codex-self-review"
requestedAt: "2026-04-25"
