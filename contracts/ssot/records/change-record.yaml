    - "不改变 repo-consistency 或 pre-push 的范围透传语义。"
    - "不引入新的业务功能、CI 工作流或依赖。"
  affectedModules:
    - "scripts"
    - "performance-management-system/test"
    - "performance-management-system/docs"
    - "README.md"
    - "contracts/ssot"

sourceOfTruth:
  primaryDocs:
    - "scripts/audit-worktree-split.mjs"
    - "README.md"
    - "performance-management-system/docs/24-自动化测试策略与脚本规划.md"
    - "contracts/ssot/xuedao-ssot-inventory.md"
  linkedDocs:
    - "contracts/ssot/records/verification-record.yaml"
  machineSourcesTouched:
    - "scripts/audit-worktree-split.mjs"
  generatedConsumers:
