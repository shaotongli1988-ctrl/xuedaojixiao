    validators:
      - "node ./scripts/check-performance-contract-closure.mjs"
      - "node ./scripts/check-xuedao-ssot-manifest.mjs"
    generatedConsumers:
      - "cool-admin-midway/src/modules/performance/domain/registry/index.ts"
      - "cool-admin-midway/src/modules/performance/domain/index.ts"
      - "scripts/sync-performance-openapi-ssot.mjs"
      - "scripts/openapi-contract-sync.mjs"
      - "cool-admin-vue/src/modules/performance/generated/"
      - "cool-uni/generated/"
      - "cool-uni/types/"

  permissionBits:
