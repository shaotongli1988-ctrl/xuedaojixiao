      - "cool-admin-midway/scripts/ensure-local-performance-schema.mjs"
      - "cool-admin-midway/src/config/config.local.ts"
      - "cool-admin-midway/src/config/config.prod.ts"

  menuRouteTopology:
    sourceFile: "contracts/ssot/menu-route-topology.catalog.json"
    validators:
      - "node ./scripts/check-menu-route-viewpath-drift.mjs --file cool-admin-midway/src/modules/base/menu.json"
    generatedConsumers:
