      - "cool-admin-midway/src/modules/performance/domain/states/salary.ts"
      - "cool-admin-midway/src/modules/performance/domain/states/suggestion.ts"
      - "cool-admin-midway/src/modules/performance/domain/states/teacher-class.ts"
      - "cool-admin-midway/src/modules/performance/domain/states/teacher-cooperation.ts"
      - "cool-admin-midway/src/modules/performance/domain/states/types.ts"
      - "cool-admin-midway/src/modules/performance/domain/states/work-plan.ts"
    validators:
      - "node ./scripts/check-state-machine-alignment.mjs --phase batch --force"
    generatedConsumers:
      - "cool-admin-midway/src/modules/performance/service/"
      - "cool-admin-midway/src/modules/performance/controller/admin/"
      - "cool-admin-vue/src/modules/performance/views/"
      - "performance-management-system/docs/05-状态机与流转规则.md"

  stateMachineCoverage:
    sourceFile: "contracts/ssot/state-machine-coverage.catalog.json"
    validators:
      - "node ./scripts/check-state-machine-coverage-ssot.mjs"
    generatedConsumers:
      - "cool-admin-midway/src/modules/performance/domain/states"
