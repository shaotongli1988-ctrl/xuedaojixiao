  verificationTemplate: "contracts/ssot/records/verification-record.template.yaml"
  artifactRoot: "reports/delivery"

blockingRules:
  - "openapi_source_drift_blocks_merge"
  - "repo_consistency_guard_fail_blocks_push"
  - "missing_change_or_verification_record_blocks_repo_level_delivery"
