# xuedao repository bootstrap for SSOT landing.
# Responsible for mapping the generic SSOT package to concrete xuedao paths.

bootstrapVersion: "1.0"
repository:
  key: "xuedao"
  root: "/Users/shaotongli/Documents/xuedao"
  owner: "repo-governance"

requiredDirectories:
  - "contracts/openapi"
  - "contracts/ssot"
  - "contracts/ssot/records"
  - "docs"
  - "scripts"
  - "reports/delivery"

requiredFiles:
  - "contracts/openapi/xuedao.openapi.json"
  - "contracts/ssot/xuedao-ssot-manifest.yaml"
  - "contracts/ssot/records/change-record.template.yaml"
  - "contracts/ssot/records/verification-record.template.yaml"
  - "scripts/run-repo-consistency-guards.mjs"
  - "scripts/check-unified-delivery.mjs"
  - "scripts/git-pre-push-gate.mjs"

existingContracts:
  apiPrimarySource: "contracts/openapi/xuedao.openapi.json"
  repoReadme: "README.md"
  flowDocs:
    - "docs/README.md"
    - "performance-management-system/docs/README.md"

enabledCapabilities:
  repoOpenApiSource: true
  localPrePushGate: true
  repoConsistencyGuards: true
  deliveryReports: true
  changeRecordsTemplate: true
  verificationRecordsTemplate: true

adoptionSequence:
  - "confirm_openapi_source_path"
  - "bind_manifest_to_existing_scripts"
  - "create_first_change_record_from_template"
  - "create_first_verification_record_from_template"
  - "wire_reports_to_reports/delivery"
  - "run_repo_consistency_guards"

successCriteria:
  - "manifest points to real xuedao scripts"
  - "first repo-level change writes both change and verification records"
  - "reports/delivery becomes the default governance artifact directory"
  - "pre-push and consistency guard commands are traceable from this bootstrap file"

